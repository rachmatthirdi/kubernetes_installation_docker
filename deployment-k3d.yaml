# Deployment untuk tugas K8S - menggunakan k3d


apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-app
  labels:
    app: login-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: login-app
  template:
    metadata:
      labels:
        app: login-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: login-app-service
spec:
  type: NodePort
  selector:
    app: login-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
